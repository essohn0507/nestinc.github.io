<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="(주)네스트아이앤씨 - 홈페이지 제작중입니다.">
    <title>(주)네스트아이앤씨 - 홈페이지 리뉴얼중</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">네스트아이앤씨<span></span></div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <img src="logo.png" alt="NEST I&C Logo" class="center-logo">
                <span class="badge">NESTINC </span>
                <h1 class="main-title">홈페이지 리뉴얼중</h1>
                <p class="subtitle">더 나은 서비스로 찾아뵙겠습니다.</p>

                <div class="scroll-indicator">
                    <div class="mouse">
                        <div class="wheel"></div>
                    </div>
                </div>
            </div>

            <div class="floating-elements">
                <div class="float-item box"></div>
                <div class="float-item circle"></div>
                <div class="float-item triangle"></div>
            </div>
        </section>

        <section id="services" class="services">
            <h2 class="section-title hidden">사업 영역</h2>
            <div class="service-image-container hidden delay-1" style="text-align: center; max-width: 1000px; margin: 0 auto; margin-bottom: 100px;">
                <img src="business-area.jpg" alt="사업 영역: 융합 제어 기술 매트릭스" style="width: 100%; height: auto; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
            </div>
            
            <h2 class="section-title hidden" style="font-size: 2.5rem;">1. Automotive</h2>
            <div class="service-image-container hidden delay-2" style="text-align: center; max-width: 1000px; margin: 0 auto; margin-bottom: 100px;">
                <img src="automotive.jpg" alt="Automotive & E-Mobility 상세 이미지" style="width: 100%; height: auto; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
            </div>

            <h2 class="section-title hidden" style="font-size: 2.5rem;">2. Precision Agriculture</h2>
            <div class="service-image-container hidden delay-3" style="text-align: center; max-width: 1000px; margin: 0 auto;">
                <img src="precision-agriculture.jpg" alt="Precision Agriculture 상세 이미지" style="width: 100%; height: auto; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
            </div>
        </section>

        <section id="contact" class="contact">
            <div class="contact-container hidden">
                <div class="contact-info">
                    <h2 class="section-title">Contact Us</h2>
                    <p>비즈니스 문의나 궁금하신 점이 있으시면 언제든지 연락주세요.</p>
                    <div class="info-item">
                        <span class="info-label">Phone</span>
                        <span class="info-value">031-750-0900</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Email</span>
                        <span class="info-value">nest@nestinc.co.kr</span>
                    </div>
                </div>

                <form id="contact-form" class="contact-form">
                    <div class="input-group">
                        <input type="text" id="name" name="user_name" required placeholder=" ">
                        <label for="name">이름 (Name)</label>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" name="user_email" required placeholder=" ">
                        <label for="email">이메일 (Email)</label>
                    </div>
                    <div class="input-group">
                        <textarea id="message" name="message" required placeholder=" " rows="4"></textarea>
                        <label for="message">문의 내용 (Message)</label>
                    </div>
                    <button type="submit" id="submit-btn" class="submit-btn">보내기</button>
                    <p class="form-notice" id="form-status"></p>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 (주)네스트아이앤씨 (NESTINC Co., LTD). All rights reserved.</p>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
